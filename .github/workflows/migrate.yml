name: Database Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Direct host db.<ref>.supabase.co is often IPv6-only (AAAA). GitHub-hosted runners
      # typically cannot use that path. Use Session pooler (5432) — IPv4 ELB — per Supabase
      # docs for migrations. Region: Dashboard → Project Settings → General → Region.
      - name: Run migrations → production
        env:
          SUPABASE_PROJECT_REF: yzdlueeeizdqwuicydbr
        run: |
          set -eu
          REGION="${{ secrets.SUPABASE_DB_REGION }}"
          if [ -z "$REGION" ]; then
            echo "Set repository secret SUPABASE_DB_REGION (e.g. eu-central-1) from Supabase → Project Settings → General → Region."
            exit 1
          fi
          POOLER_HOST="aws-0-${REGION}.pooler.supabase.com"
          # Session mode user is postgres.<project_ref> (not postgres@db...)
          supabase db push \
            --db-url "postgresql://postgres.${SUPABASE_PROJECT_REF}@${POOLER_HOST}:5432/postgres?sslmode=require" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD_PROD }}"
