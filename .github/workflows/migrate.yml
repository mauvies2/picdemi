name: Database Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest

    env:
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
      DB_URL: postgresql://postgres.yzdlueeeizdqwuicydbr@aws-0-eu-west-1.pooler.supabase.com:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - name: Create migration tracking table
        run: |
          psql "$DB_URL" -c "
            create schema if not exists supabase_migrations;
            create table if not exists supabase_migrations.schema_migrations (
              version text primary key
            );
          "

      - name: Run pending migrations
        run: |
          for file in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$file" .sql)
            applied=$(psql "$DB_URL" -t -c \
              "select count(*) from supabase_migrations.schema_migrations where version = '$version';" \
              | tr -d ' \n')
            if [ "$applied" = "0" ]; then
              echo "Applying $version..."
              psql "$DB_URL" -f "$file"
              psql "$DB_URL" -c \
                "insert into supabase_migrations.schema_migrations (version) values ('$version');"
              echo "✓ $version"
            else
              echo "- $version (already applied)"
            fi
          done
