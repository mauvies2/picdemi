name: Database Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations → production
        run: |
          supabase db push \
            --db-url "postgresql://postgres:${{ secrets.SUPABASE_DB_PASSWORD_PROD }}@db.yzdlueeeizdqwuicydbr.supabase.co:5432/postgres" \
